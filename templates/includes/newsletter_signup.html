<section class="newsletter-section">
    <div class="container" style="max-width: 900px;">
        <div class="text-center">
            <span class="badge rounded-pill mb-3"
                  style="background: linear-gradient(135deg, #6366F1 0%, #EC4899 100%); color: white; font-family: var(--font-heading); font-size: 0.8rem; letter-spacing: 0.5px; padding: 0.5rem 1rem;">
                STAY UPDATED
            </span>
            <h2 class="mb-2" style="font-family: var(--font-heading); font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #6366F1 0%, #EC4899 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                Get Exclusive Offers & Recipes
            </h2>
            <p class="text-muted mb-4" style="font-size: 0.95rem;">
                Subscribe to our newsletter and get healthy recipes, parenting tips &amp; <strong>exclusive discounts</strong>.
            </p>
            <form id="newsletter-form" class="d-flex flex-column flex-sm-row gap-2 justify-content-center align-items-center">
                <input type="email" class="form-control rounded-pill"
                       placeholder="Enter your email address"
                       style="max-width: 340px; border: 2px solid #E2E8F0; padding: 0.85rem 1.5rem; font-size: 0.95rem;"
                       required>
                <button type="submit" class="btn btn-sf-secondary" style="border-radius: 12px; padding: 0.85rem 2.5rem; font-weight: 600;">
                    Subscribe
                </button>
            </form>
            <p class="text-muted mt-3" style="font-size: 0.8rem;">No spam, ever. Unsubscribe anytime.</p>
        </div>
    </div>
</section>
