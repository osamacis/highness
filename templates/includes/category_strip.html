<div class="category-strip py-5 bg-white">
    <div class="container">
        <h3 class="text-center mb-5" style="font-family: var(--font-heading); font-size: 2.2rem; color: var(--sf-dark); font-weight: 900;">What are you looking for today?</h3>

        <div class="d-flex flex-wrap justify-content-center gap-4 align-items-center" style="row-gap: 2rem;">
            {% for cat in NAV_CATEGORIES %}
                <a href="{% url 'products:product_list_by_category' cat.slug %}" class="category-circle-card">
                    <div class="category-circle-img-wrapper">
                        {% if cat.icon %}
                            <img src="{{ cat.icon.url }}" alt="{{ cat.name }}">
                        {% else %}
                            <img src="https://placehold.co/100x100/F8BE15/2C0409?text={{ cat.name|slice:":2"|urlencode }}" alt="{{ cat.name }}">
                        {% endif %}
                    </div>
                    <span class="category-title text-capitalize">{{ cat.name }}</span>
                </a>
            {% empty %}
                <p class="text-muted">No categories available.</p>
            {% endfor %}
        </div>
    </div>
</div>
